- name: 1. php 설치 전 사전작업
  block:
    - name: 1-1. libjpeg.so 심볼릭
      file: 
        src: /usr/lib64/libjpeg.so
        dest: /usr/lib/libjpeg.so
        state: link

    - name: 1-2. libpng.so 심볼릭
      file:
        src: /usr/lib64/libpng.so
        dest: /usr/lib/libpng.so
        state: link

    - name: 1-3. /usr/include/bits/typesizes.h 내용 수정
      shell: |
        /bin/sed -i 's/1024/4096/g' /usr/include/bits/typesizes.h

    - name: 1-4. 패키지 설치
      dnf: 
        name: "{{ item }}"
        state: present
      loop:
        - sqlite-devel
        - libicu-devel
        - oniguruma-devel
        - cmake3





- name: 2. PHP-FPM 설치 
  block:
    - name: 2-1. PHP-FPM  설치파일 복사
      copy:
        src: "/home/firefox/upgrade/php-8.2.16.tar.gz"
        dest: "/usr/local/src/"

    - name: 2-2. 설치파일 압축해제
      unarchive:
        src: "/usr/local/src/php-8.2.16.tar.gz"
        dest: "/usr/local/src/"
        remote_src: yes

    - name: 2-3. php-fd-size
      shell: | 
        echo "#undef __FD_SETSIZE" >> main/php.h
        echo "#define __FD_SETSIZE 4096" >> main/php.h
        echo "#undef FD_SETSIZE" >> main/php.h
        echo "#define FD_SETSIZE 4096" >> main/php.h
      args:
        chdir: "/usr/local/src/php-8.2.16"

    - name: 2-4. PHP-FPM 컴파일 설치
      shell: |
        ./configure --prefix=/usr/local/php --enable-fpm --with-config-file-path=/etc/httpd/conf --enable-mysqlnd --with-pdo-mysql=mysqlnd --with-mysqli=mysqlnd --disable-debug --enable-sigchild --enable-sysvsem --enable-sysvshm --enable-bcmath --enable-ftp --enable-sockets --enable-exif --with-zlib-dir=/usr --with-zlib --enable-gd --with-jpeg --with-freetype --with-iconv --enable-mbstring --with-curl --enable-soap --with-openssl --with-pear --enable-fd-setsize=4096
        make -j 4 && make install 
      args:
        chdir: "/usr/local/src/php-8.2.16" 

    - name: 2-5. php.ini 파일 복사
      copy:
        src: "/home/firefox/upgrade/php.ini"
        dest: "/etc/httpd/conf/"
      

       



