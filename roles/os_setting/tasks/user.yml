- name: 1-1. gabia, mallusers 그룹 생성
  group: 
    name: "{{ item }}"
    state: present
  loop:
    - gabia
    - mallusers


- name: 1-2. zlxpf 유저 생성
  user: 
    name: zlxpf
    group: gabia
    shell: /bin/bash
    home: /home/firefox
    password_expire_max: 180
    password_expire_warn: 30


- name: 1-3. shopbuilder 유저 생성
  user: 
    name: shopbuilder
    group: mallusers
    groups: gabia
    shell: /bin/bash
    home: /home/firefox
    password_expire_max: 180
    password_expire_warn: 30


- name: 1-4. root 패스워드 정책 설정
  user: 
    name: root
    password_expire_max: 180
    password_expire_warn: 30
 

- name: 1-5. 불필요 계정 삭제
  user: 
    name: "{{ item }}"
    state: absent 
  loop:
    - adm
    - lp
    - games
    - sync
    - ftp
    - operator
